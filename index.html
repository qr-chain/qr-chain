<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#050807; --bg2:#0b1210; --line:#241c1c;
    --danger:#ff5c5c; --text-dim:#8a6f6f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, rgba(255,92,92,0.06), transparent 60%),
      var(--bg);
    color:var(--danger);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .crt{
    position:relative;
    border:1px solid var(--line);
    background:linear-gradient(180deg, var(--bg2), var(--bg));
    border-radius:4px;
    padding:36px 30px;
    max-width:420px; width:100%;
    text-align:center;
    box-shadow:0 20px 60px -20px rgba(0,0,0,0.8);
    overflow:hidden;
  }
  .crt::before{
    content:""; position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom,
      rgba(255,92,92,0.03) 0px, rgba(255,92,92,0.03) 1px,
      transparent 1px, transparent 3px);
    pointer-events:none;
  }
  .code{ font-size:11px; letter-spacing:0.2em; color:var(--text-dim); margin-bottom:14px; }
  h1{ font-size:20px; margin:0; letter-spacing:0.03em; }
</style>
</head>
<body>
  <div class="crt">
    <div class="code">ERR_403</div>
    <h1>잘못된 접근입니다</h1>
  </div>
</body>
</html>
