<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR_CHAIN.exe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --bg: #050807;
    --bg2: #0b1210;
    --line: #1c2b24;
    --green: #39ff88;
    --green-dim: #1f8f52;
    --amber: #ffb454;
    --text: #d4ffe4;
    --text-dim: #6f9c85;
    --danger: #ff5c5c;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top, rgba(57,255,136,0.06), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  #app{
    width:100%;
    max-width:480px;
  }
  .crt{
    position:relative;
    border:1px solid var(--line);
    background:linear-gradient(180deg, var(--bg2), var(--bg));
    border-radius:4px;
    padding:28px 26px 24px;
    box-shadow:
      0 0 0 1px rgba(57,255,136,0.05),
      0 20px 60px -20px rgba(0,0,0,0.8),
      inset 0 1px 0 rgba(255,255,255,0.02);
    overflow:hidden;
  }
  .crt::before{
    content:"";
    position:absolute; inset:0;
    background:repeating-linear-gradient(
      to bottom,
      rgba(57,255,136,0.025) 0px,
      rgba(57,255,136,0.025) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events:none;
  }
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    font-size:11px; letter-spacing:0.12em; color:var(--text-dim);
    margin-bottom:20px; text-transform:uppercase;
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 8px var(--green); display:inline-block; margin-right:6px;
    animation:blink 1.6s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}
  h1{
    font-size:20px; margin:0 0 4px; letter-spacing:0.02em;
    color:var(--green); font-weight:800;
  }
  h1 .bracket{color:var(--text-dim); font-weight:400;}
  .sub{ color:var(--text-dim); font-size:12.5px; line-height:1.6; margin:0 0 22px;}
  label{
    display:block; font-size:11px; color:var(--text-dim);
    letter-spacing:0.1em; text-transform:uppercase; margin:16px 0 6px;
  }
  input[type=text], input[type=number]{
    width:100%; background:#03100a; border:1px solid var(--line);
    color:var(--green); font-family:inherit; font-size:14px;
    padding:11px 12px; border-radius:2px; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus{ border-color:var(--green-dim); box-shadow:0 0 0 3px rgba(57,255,136,0.08);}
  .row{ display:flex; gap:12px; }
  .row > div{ flex:1; }
  .row .steps{ flex:0 0 90px; }
  button{
    width:100%; margin-top:22px; background:var(--green); color:#04120a;
    border:none; font-family:inherit; font-weight:800; font-size:13px;
    letter-spacing:0.08em; text-transform:uppercase; padding:13px;
    border-radius:2px; cursor:pointer; transition:transform .1s, box-shadow .15s;
    box-shadow:0 0 20px -4px rgba(57,255,136,0.5);
  }
  button:hover{ transform:translateY(-1px); box-shadow:0 0 28px -2px rgba(57,255,136,0.7);}
  button:active{ transform:translateY(0px); }
  #result{ margin-top:22px; }
  .qr-wrap{
    background:#eafff2; padding:16px; border-radius:6px;
    display:flex; align-items:center; justify-content:center;
    margin:14px 0; box-shadow:0 0 0 1px rgba(57,255,136,0.15);
  }
  .hint{ font-size:11px; color:var(--text-dim); line-height:1.6; }
  .url-echo{
    font-size:10.5px; color:var(--green-dim); word-break:break-all;
    background:#03100a; border:1px solid var(--line); padding:8px 10px;
    border-radius:2px; margin-top:8px;
  }
  .center{ text-align:center; }
  .glitch{ animation:glitch 2.6s infinite; }
  @keyframes glitch{
    0%,96%,100%{ text-shadow:none; transform:none; }
    97%{ text-shadow:2px 0 var(--danger), -2px 0 var(--green); transform:translateX(1px); }
    98%{ text-shadow:-2px 0 var(--danger), 2px 0 var(--green); transform:translateX(-1px); }
  }
  .copybtn{
    margin-top:10px; background:transparent; border:1px solid var(--line);
    color:var(--text-dim); box-shadow:none; font-weight:600;
  }
  .copybtn:hover{ transform:none; box-shadow:none; border-color:var(--green-dim); color:var(--green);}
  .qr-only{
    background:#eafff2; padding:20px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
  }
  .invalid{
    text-align:center; color:var(--danger);
  }
  .invalid .code{ font-size:11px; letter-spacing:0.2em; color:#a06f6f; margin-bottom:14px; }
  .invalid h1{ color:var(--danger); font-size:20px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
const OBFUSCATION_KEY = 'qrchain-v1';

function xor(str, key){
  let out = '';
  for(let i=0;i<str.length;i++){
    out += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  }
  return out;
}

function b64urlEncode(str){
  const utf8 = unescape(encodeURIComponent(str));
  return btoa(utf8).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function b64urlDecode(str){
  let s = str.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length % 4) s += '=';
  return decodeURIComponent(escape(atob(s)));
}

// Packs {step, n, t} into one opaque token so nothing readable leaks into the URL/QR.
function packToken(step, n, t){
  const payload = JSON.stringify([step, n, t]);
  return b64urlEncode(xor(payload, OBFUSCATION_KEY));
}

const app = document.getElementById('app');

// Links always point to the domain root (where the actual QR/redirect chain lives),
// never to /make/ — /make/ is only for creating a new chain.
function rootUrl(){
  const u = new URL(window.location.href);
  u.pathname = '/';
  u.search = '';
  u.hash = '';
  return u.toString();
}

function buildUrl(nextStep, t, n){
  const u = new URL(rootUrl());
  u.searchParams.set('x', packToken(nextStep, n, t));
  return u.toString();
}

function shell(inner, badge){
  app.innerHTML = `
    <div class="crt">
      <div class="topbar">
        <span><span class="dot"></span>QR_CHAIN</span>
        <span>${badge}</span>
      </div>
      ${inner}
    </div>
  `;
}

renderForm();

function renderForm(){
  shell(`
    <h1>체인 생성기 <span class="bracket">[NEW]</span></h1>
    <p class="sub">최종 목적지 URL을 넣으면, 스캔할 때마다 다음 QR이 나오는
    체인을 만들어줘요. 마지막 스캔에서 목적지로 이동합니다.</p>

    <label>목적지 URL</label>
    <input type="text" id="targetInput" value="https://youtube.com">

    <div class="row">
      <div>
        <label>단계 수</label>
        <input type="number" id="stepsInput" value="5" min="1" max="15">
      </div>
    </div>

    <button id="genBtn">체인 생성 &gt;&gt;</button>
    <div id="result"></div>
  `, 'MAKE');

  document.getElementById('genBtn').onclick = () => {
    const t = document.getElementById('targetInput').value.trim();
    const n = parseInt(document.getElementById('stepsInput').value, 10) || 5;
    if(!t){ return; }
    const firstUrl = buildUrl(1, t, n);
    const result = document.getElementById('result');
    result.innerHTML = `
      <label style="margin-top:22px;">1번째 QR</label>
      <div class="qr-wrap"><div id="qr"></div></div>
      <p class="hint">이 QR을 스캔하면 체인이 시작돼요. 총 ${n}단계를 거쳐야 목적지에 도착합니다.</p>
      <div class="url-echo">${firstUrl}</div>
      <button class="copybtn" id="copyBtn">링크 복사</button>
    `;
    new QRCode(document.getElementById('qr'), {
      text: firstUrl, width:220, height:220,
      colorDark:"#04120a", colorLight:"#eafff2"
    });
    document.getElementById('copyBtn').onclick = () => {
      navigator.clipboard.writeText(firstUrl);
      const b = document.getElementById('copyBtn');
      b.textContent = '복사됨 ✓';
      setTimeout(()=> b.textContent = '링크 복사', 1400);
    };
  };
}

</script>
</body>
</html>
